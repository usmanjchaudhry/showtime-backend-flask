name: Nightly Stripe Sync

on:
  schedule:
    # Runs at 09:00 UTC = 1:00 AM PST (Los Angeles Time)
    - cron: '0 9 * * *'
  # Allows you to run this manually from the GitHub "Actions" tab button
  workflow_dispatch:

jobs:
  sync-stripe:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # install requests, stripe, supabase, python-dotenv
        run: |
          python -m pip install --upgrade pip
          pip install stripe supabase python-dotenv postgrest requests

      - name: Run Sync Script
        env:
          # GitHub injects these secrets securely
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: python cron_sync_stripe.py